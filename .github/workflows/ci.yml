name: CI — FoundrOS Finance

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/finance_test
  DIRECT_URL: postgresql://postgres:postgres@localhost:5432/finance_test
  NEXTAUTH_SECRET: ci-test-secret-do-not-use-in-production
  NEXTAUTH_URL: http://localhost:3008
  NODE_ENV: test

jobs:
  quality:
    name: Type Check → Lint → Test → Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: finance_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Prisma ──────────────────────────────────────────────
      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Push schema to test DB
        run: npx prisma db push --accept-data-loss

      # ── Gate 1: Type Safety ─────────────────────────────────
      - name: "Gate 1: Type check"
        run: npx tsc --noEmit

      # ── Gate 2: Lint ────────────────────────────────────────
      - name: "Gate 2: Lint"
        run: npm run lint

      # ── Gate 3: Tests ───────────────────────────────────────
      - name: "Gate 3: Unit + Integration tests"
        run: npm test

      # ── Gate 4: Build ───────────────────────────────────────
      - name: "Gate 4: Production build"
        run: npm run build
        env:
          # Build needs valid (but unused) URLs to not fail
          GOOGLE_CLIENT_ID: "ci-placeholder"
          GOOGLE_CLIENT_SECRET: "ci-placeholder"

      # ── Observability Metrics (non-blocking) ────────────────
      - name: "Metric: Console statement count"
        if: always()
        run: |
          COUNT=$(grep -rn "console\.\(log\|warn\|error\)" src/app/api/ src/lib/ --include="*.ts" 2>/dev/null | wc -l | tr -d ' ')
          echo "### 📊 Observability Metrics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value | Target |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`console.*\` in server code | **${COUNT}** | 0 |" >> $GITHUB_STEP_SUMMARY
          if [ "$COUNT" -gt "0" ]; then
            echo "::warning::${COUNT} console.* statements remain in server code (target: 0)"
          fi

      - name: "Metric: Test count"
        if: always()
        run: |
          TESTS=$(npm test 2>&1 | grep -oP '\d+ (?=test)' | tail -1 || echo "?")
          echo "| Test count | **${TESTS}** | ≥200 |" >> $GITHUB_STEP_SUMMARY
